<!-- SUBSTITUA APENAS ESSAS PARTES NO SEU CÓDIGO -->

<style>

/* ===== FOTO COM EFEITO CINEMA ===== */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  background:url('fotoigreja.jpeg') center/cover no-repeat;
}

/* overlay escuro */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

/* efeito nuvem suave */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 30% 40%, rgba(255,255,255,0.15), transparent 60%),
             radial-gradient(circle at 70% 60%, rgba(255,255,255,0.1), transparent 70%);
  animation:nuvem 12s ease-in-out infinite alternate;
  z-index:0;
}

@keyframes nuvem{
  from{transform:scale(1)}
  to{transform:scale(1.1)}
}

/* garante conteúdo acima */
.card{
  position:relative;
  z-index:2;
  background:rgba(255,255,255,0.95);
}

/* títulos mais legíveis */
h2{
  font-family:'Cinzel',serif;
  margin-bottom:10px;
  color:#8a6424;
}

</style>

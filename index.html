<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edvaldo & Ana</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
  --gold-light:#f7e27b;
  --gold-dark:#8c6b1f;
  --green:#1f4d3a;
  --green-light:#2f6b52;
}

body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#dce8e2,#ffffff);
  color:var(--green);
}

.card{
  max-width:900px;
  margin:auto;
  padding:30px;
  background:#fff;
  border-radius:20px;
  text-align:center;
}

.nomes{
  font-family:'Alex Brush';
  font-size:60px;
  background:linear-gradient(45deg,#8c6b1f,#d4af37,#f7e27b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn{
  display:block;
  margin:10px 0;
  padding:12px;
  border-radius:30px;
  background:var(--green);
  color:var(--gold-light);
  border:none;
  cursor:pointer;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:20px;
}

textarea,input{
  width:100%;
  margin-top:10px;
  padding:10px;
}

footer{
  text-align:center;
  padding:20px;
  background:var(--green);
  color:#fff;
}
</style>
</head>

<body>

<div class="card">
  <h1 class="nomes">Edvaldo & Ana</h1>
  <p>Casamento às 19h</p>
</div>

<section id="presentes">
  <h2>Lista de Presentes</h2>

  <div class="box">

    <button class="btn" onclick="mostrarOpcao('bemol')">Bemol</button>
    <button class="btn" onclick="mostrarOpcao('dinamica')">Dinâmica</button>
    <button class="btn" onclick="mostrarOpcao('pix')">PIX</button>

    <div id="bemol" style="display:none">
      <a class="btn" target="_blank"
      href="https://www.bemol.com.br/lp/marcia%26ronilson">
      Ver lista Bemol
      </a>
    </div>

    <div id="dinamica" style="display:none">
      <a class="btn" target="_blank"
      href="https://www.dinamicautil.com.br/index.php?route=listapresente/edit&id_lista=60034">
      Ver lista Dinâmica
      </a>
    </div>

    <div id="pix" style="display:none">
      <p>Chave PIX:</p>
      <b>993293049</b>
    </div>

  </div>
</section>

<section>
<h2>Contagem</h2>
<p id="tempo"></p>
</section>

<footer>
  Edvaldo & Ana
</footer>

<script>

function mostrarOpcao(tipo){
  document.getElementById("bemol").style.display="none";
  document.getElementById("dinamica").style.display="none";
  document.getElementById("pix").style.display="none";
  document.getElementById(tipo).style.display="block";
}

// CONTAGEM CORRIGIDA
const data = new Date(2026,9,30,19,0,0).getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const diff = data - now;

  if(diff <= 0){
    document.getElementById("tempo").innerHTML="Chegou o grande dia!";
    return;
  }

  const dias = Math.floor(diff/(1000*60*60*24));
  const horas = Math.floor((diff/(1000*60*60))%24);
  const minutos = Math.floor((diff/(1000*60))%60);

  document.getElementById("tempo").innerHTML =
  dias+" dias "+horas+"h "+minutos+"min";
},1000);

</script>

</body>
</html>

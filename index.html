<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Premium - Ronilson & Márcia</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a24a;
  --dark:#3f4d63;
  --blue:#4f5f78;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#0f1a2b,#1f2f4a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

/* ENVELOPE */
.envelope{
  width:320px;
  height:220px;
  background:#142845;
  position:relative;
  cursor:pointer;
  border-radius:12px;
  overflow:hidden;
}

.tampa{
  position:absolute;
  width:100%;
  height:100%;
  background:#1f3b63;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1s;
}

.envelope.aberto .tampa{
  transform:rotateX(180deg);
}

.texto{
  position:absolute;
  bottom:10px;
  width:100%;
  text-align:center;
}

/* CONVITE */
.convite{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#d6dde6,#fff);
  display:none;
  overflow:auto;
}

.card{
  max-width:900px;
  margin:40px auto;
  background:#fff;
  border-radius:20px;
  padding:30px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}

.nomes{
  font-family:'Alex Brush';
  font-size:60px;
  color:var(--gold);
}

.data-destaque .dia{
  font-size:90px;
  font-family:'Cinzel';
}

.data-destaque .mes{
  font-size:22px;
}

.btn{
  display:block;
  margin:10px auto;
  padding:12px;
  border-radius:25px;
  background:var(--blue);
  color:#f4d27a;
  text-decoration:none;
}

</style>
</head>

<body>

<div class="envelope" onclick="abrir()" id="env">
  <div class="tampa"></div>
  <div class="texto">Abrir Convite</div>
</div>

<div class="convite" id="convite">
  <div class="card">

    <img src="rm1.png" width="150">

    <h1 class="nomes">Ronilson & Márcia</h1>

    <div class="data-destaque">
      <div class="dia">30</div>
      <div class="mes">Outubro 2026</div>
      <div>19 horas</div>
    </div>

    <p style="margin-top:20px;">Com alegria convidamos você</p>

    <h3>📍 Cerimônia</h3>
    <p>Capela Nossa Senhora do Perpétuo Socorro</p>
    <a class="btn" href="https://maps.app.goo.gl/6k88jM35cc1eeQFNA" target="_blank">Ver Local</a>

    <h3>🎉 Recepção</h3>
    <p>Beer Dance</p>
    <a class="btn" href="https://maps.app.goo.gl/iXigGFA4DZK2rKfg9" target="_blank">Ver Local</a>

    <h3>🎁 Presentes</h3>
    <a class="btn" href="https://www.bemol.com.br/lp/marcia%26ronilson" target="_blank">Lista Bemol</a>

    <a class="btn" onclick="confirmar()">Confirmar via WhatsApp</a>

  </div>
</div>

<script>
function abrir(){
  document.getElementById('env').classList.add('aberto');
  setTimeout(()=>{
    document.getElementById('convite').style.display='block';
  },800);
}

function confirmar(){
  const msg = encodeURIComponent('Confirmo minha presença no casamento');
  window.open('https://wa.me/5592984236693?text='+msg);
}
</script>

</body>
</html>

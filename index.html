<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ronilson & Márcia</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== CORES ===== */
:root{
  --gold:#c9a24a;
  --gold-light:#f4d27a;
  --dark:#3f4d63;
  --blue:#4f5f78;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#d6dde6,#f7f1e8,#ffffff);
}

/* ===== ENVELOPE ===== */
#tela-envelope{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.convite{
  max-width:380px;
  width:100%;
  background:#fff;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.3);
}

.topo{
  text-align:center;
  padding:25px;
}

.img-monograma{
  width:90px;
}

.titulo{
  font-family:'Cinzel';
  font-size:12px;
  letter-spacing:2px;
}

.envelope{
  height:220px;
  background:linear-gradient(135deg,#4f5f78,#3f4d63);
  position:relative;
  cursor:pointer;
}

.tampa{
  position:absolute;
  width:100%;
  height:100%;
  background:#2c3b52;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transition:1s;
}

.envelope.aberto .tampa{
  transform:rotateX(180deg);
}

.texto{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#fff;
}

.nomes-preview{
  text-align:center;
  padding:20px;
  font-family:'Alex Brush';
  font-size:30px;
  color:var(--gold);
}

/* ===== SITE ===== */
#site{display:none}

.hero{
  padding:20px;
  display:flex;
  justify-content:center;
}

.card{
  max-width:900px;
  width:100%;
  background:#fff;
  padding:30px;
  border-radius:30px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
}

.nomes{
  font-family:'Alex Brush';
  font-size:60px;
  color:var(--gold);
}

/* DATA */
.data-box{
  margin:20px 0;
}

.dia{
  font-size:80px;
  font-weight:bold;
  color:var(--dark);
}

.mes{
  font-family:'Cinzel';
  font-size:18px;
  color:var(--gold);
}

.hora{
  margin-top:5px;
  font-weight:bold;
}

/* BOTÕES PADRÃO */
.btn{
  display:block;
  margin:10px auto;
  padding:14px;
  border-radius:30px;
  background:linear-gradient(135deg,#4f5f78,#3f4d63);
  color:#f4d27a;
  text-decoration:none;
  border:none;
  cursor:pointer;
}

/* ===== BOTÕES LUXO ===== */
.botoes-presentes{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:20px;
}

.btn-luxo{
  position:relative;
  height:55px;
  width:100%;
  border-radius:40px;
  border:1px solid rgba(201,162,74,.6);
  background:linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.05));
  backdrop-filter:blur(10px);
  color:#c9a24a;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
  transition:.4s;
}

.btn-luxo span{z-index:2}

.btn-luxo::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  left:-100%;
  background:linear-gradient(120deg, transparent, rgba(244,210,122,.6), transparent);
  transition:.6s;
}

.btn-luxo:hover{
  transform:translateY(-3px) scale(1.02);
  box-shadow:0 15px 35px rgba(0,0,0,.25);
  color:#f4d27a;
}

.btn-luxo:hover::before{left:100%}

.btn-luxo:active{transform:scale(.98)}

@media(min-width:768px){
  .botoes-presentes{flex-direction:row;justify-content:center;flex-wrap:wrap;}
  .btn-luxo{width:220px;}
}

/* INPUTS */
.input-campo, .textarea-campo{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--gold);
}

/* BOX */
section{padding:30px 15px;text-align:center}
.box{
  background:#fff;
  padding:20px;
  border-radius:20px;
  margin-top:10px;
}

/* AUDIO */
.audio{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#3f4d63;
  color:#fff;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

</style>
</head>

<body>

<audio id="musica" loop>
<source src="amor.mp3" type="audio/mpeg">
</audio>

<div class="audio" onclick="playMusic()">🎵 Música</div>

<!-- ENVELOPE -->
<div id="tela-envelope">
<div class="convite">
<div class="topo">
<img src="rm1.png" class="img-monograma">
<div class="titulo">CONVITE ESPECIAL DE CASAMENTO</div>
</div>

<div class="envelope" onclick="abrir()" id="env">
<div class="tampa"></div>
<div class="texto">CLIQUE NO ENVELOPE</div>
</div>

<div class="nomes-preview">Ronilson & Márcia</div>
</div>
</div>

<!-- SITE -->
<div id="site">

<div class="hero">
<div class="card">

<img src="rm1.png" style="width:150px">

<h1 class="nomes">Ronilson & Márcia</h1>

<div class="data-box">
<div class="dia">30</div>
<div class="mes">Outubro 2026</div>
<div class="hora">19 horas</div>
</div>

<button class="btn" onclick="confirmar()">Confirmar Presença</button>
<a class="btn" href="#presenca">Consultar Senhas</a>

</div>
</div>

<!-- PRESENTES -->
<section>
<h2>Lista de Presentes</h2>

<div class="box">

<div class="botoes-presentes">

<button class="btn-luxo" onclick="window.open('https://www.bemol.com.br/lp/marcia%26ronilson')">
<span>🎁 Lista Bemol</span>
</button>

<button class="btn-luxo" onclick="window.open('https://www.dinamicautil.com.br/index.php?route=listapresente/edit&id_lista=60034')">
<span>💎 Lista Dinâmica</span>
</button>

<button class="btn-luxo" onclick="mostrarPix()">
<span>💰 PIX</span>
</button>

</div>

<div id="pix" style="display:none;margin-top:15px;">
<p><strong>Chave PIX:</strong></p>
<p style="font-size:18px;color:#c9a24a;">92984236693</p>
</div>

</div>
</section>

<!-- CONSULTA -->
<section id="presenca">
<h2>Consultar Senhas</h2>

<div class="box">
<input type="text" id="buscaConvidado" class="input-campo" placeholder="Digite seu nome ou telefone">

<button class="btn" onclick="consultarConvite()">Consultar</button>

<div id="areaResultado" style="display:none;">
<textarea id="resultadoConvite" class="textarea-campo" readonly></textarea>

<button class="btn" onclick="enviarWhatsApp()">Enviar WhatsApp</button>
<button class="btn" onclick="copiarConfirmacao()">Copiar</button>
</div>
</div>
</section>

</div>

<script>

let tocando=false;
function playMusic(){
const m=document.getElementById("musica");
tocando?m.pause():m.play();
tocando=!tocando;
}

function abrir(){
document.getElementById("env").classList.add("aberto");
setTimeout(()=>{
document.getElementById("tela-envelope").style.display="none";
document.getElementById("site").style.display="block";
},1000);
}

function confirmar(){
window.open("https://wa.me/5592984236693?text=Confirmo presença 💛");
}

function mostrarPix(){
const p=document.getElementById("pix");
p.style.display=p.style.display==="none"?"block":"none";
}

/* CONVIDADOS */
const convidados=[
{nome:"ana silva",telefone:"92984000001",senhas:1},
{nome:"bruno souza",telefone:"92984000002",senhas:1}
];

let mensagem="";

function consultarConvite(){
const busca=document.getElementById("buscaConvidado").value.toLowerCase();
const c=convidados.find(x=>x.nome===busca||x.telefone===busca);

if(!c){alert("Não encontrado");return;}

let texto=`Nome: ${c.nome}\nSenhas: ${c.senhas}\n`;

for(let i=1;i<=c.senhas;i++){
texto+=`Senha ${i}: ${c.telefone.slice(-4)}-${i}\n`;
}

document.getElementById("resultadoConvite").value=texto;
document.getElementById("areaResultado").style.display="block";
mensagem=texto;
}

function enviarWhatsApp(){
window.open("https://wa.me/5592984236693?text="+encodeURIComponent(mensagem));
}

function copiarConfirmacao(){
navigator.clipboard.writeText(mensagem);
alert("Copiado!");
}

</script>

</body>
</html>

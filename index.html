<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronilson & Márcia</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a24a;
  --gold-light:#f4d27a;
  --gold-dark:#8a6424;
  --dark:#3f4d63;
  --blue:#4f5f78;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#d6dde6,#f7f1e8,#ffffff);
  color:var(--dark);
  overflow-x:hidden;
}

/* TELA DO CONVITE FECHADO */
#tela-abertura{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:25px;
}

.envelope-box{
  width:min(90vw,420px);
  height:280px;
  position:relative;
  cursor:pointer;
  perspective:1000px;
}

.envelope-corpo{
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#4f5f78,#2c3b52);
  border-radius:24px;
  box-shadow:0 25px 70px rgba(0,0,0,.35);
  overflow:hidden;
}

.envelope-corpo::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(145deg, transparent 50%, rgba(255,255,255,.12) 50%);
}

.envelope-tampa{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#26364d;
  clip-path:polygon(0 0,100% 0,50% 58%);
  transform-origin:top;
  transition:1.1s ease;
  z-index:3;
  border-radius:24px;
}

.envelope-box.abrir .envelope-tampa{
  transform:rotateX(180deg);
}

.selo{
  position:absolute;
  width:86px;
  height:86px;
  border-radius:50%;
  background:linear-gradient(45deg,#8a6424,#c9a24a,#f4d27a);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Alex Brush',cursive;
  font-size:34px;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:4;
  box-shadow:0 8px 25px rgba(0,0,0,.25);
}

.envelope-box.abrir .selo{
  opacity:0;
  transition:.5s;
}

.texto-abrir{
  position:absolute;
  bottom:-55px;
  left:0;
  right:0;
  text-align:center;
  color:var(--gold-dark);
  font-family:'Cinzel',serif;
  font-size:16px;
}

/* SITE */
#site{
  display:none;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  animation:entrada .9s ease;
}

@keyframes entrada{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* CARD */
.card{
  max-width:1000px;
  width:100%;
  background:#fff;
  padding:30px;
  border-radius:30px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  text-align:center;
  border:1px solid rgba(201,162,74,.35);
}

/* IMAGENS */
.logo1{
  width:100%;
  max-width:350px;
  height:220px;
  object-fit:cover;
  object-position:center;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  margin-bottom:20px;
}

.logo2{
  width:250px;
  max-width:85%;
  margin-top:10px;
}

/* NOMES */
.nomes{
  font-family:'Alex Brush',cursive;
  font-size:clamp(58px,8vw,90px);
  margin:10px 0;
  background:linear-gradient(45deg,#8a6424,#c9a24a,#f4d27a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* DATA */
.data-casamento{
  margin:25px 0;
}

.dia{
  font-family:'Cinzel',serif;
  font-size:clamp(80px,10vw,120px);
  font-weight:bold;
  line-height:.9;
  background:linear-gradient(45deg,#8a6424,#c9a24a,#f4d27a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.mes-ano{
  font-family:'Cinzel',serif;
  font-size:18px;
  letter-spacing:2px;
  color:var(--gold-dark);
}

.hora{
  margin-top:5px;
  font-style:italic;
}

/* BOTÕES */
.btn, button{
  display:block;
  margin:10px auto;
  padding:13px 20px;
  background:linear-gradient(135deg,#4f5f78,#3f4d63);
  color:#f4d27a;
  border-radius:25px;
  text-decoration:none;
  width:90%;
  max-width:310px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.btn:hover, button:hover{
  transform:scale(1.03);
}

/* CONSULTA */
.consulta-box{
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid rgba(201,162,74,.35);
}

.input{
  width:90%;
  max-width:310px;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:15px;
}

.resultado{
  margin-top:12px;
  font-size:15px;
  white-space:pre-line;
  color:var(--dark);
  font-weight:600;
}

/* RESPONSIVO */
@media(min-width:768px){
  .card{
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    gap:25px;
    text-align:left;
  }

  .left{text-align:center}
  .right{text-align:left}

  .btn, button, .input{
    margin-left:0;
  }
}

@media(max-width:600px){
  .card{
    padding:25px 18px;
  }

  .envelope-box{
    height:240px;
  }
}
</style>
</head>

<body>

<!-- CONVITE FECHADO -->
<div id="tela-abertura">
  <div class="envelope-box" onclick="abrirConvite()" id="envelope">
    <div class="envelope-corpo"></div>
    <div class="envelope-tampa"></div>
    <div class="selo">R&M</div>
    <div class="texto-abrir">Clique para abrir o convite</div>
  </div>
</div>

<!-- CONVITE ABERTO -->
<div id="site">
  <div class="hero">
    <div class="card">

      <div class="left">
        <img src="fotoigreja.jpeg" class="logo1" alt="Foto da igreja">
        <img src="rm1.png" class="logo2" alt="Monograma Ronilson e Márcia">
      </div>

      <div class="right">
        <h1 class="nomes">Ronilson & Márcia</h1>

        <p>
          Com alegria no coração, convidamos você para celebrar conosco este momento especial.
        </p>

        <div class="data-casamento">
          <div class="dia">30</div>
          <div class="mes-ano">OUTUBRO • 2026</div>
          <div class="hora">às 19h</div>
        </div>

        <a class="btn" href="https://maps.app.goo.gl/iXigGFA4DZK2rKfg9" target="_blank">Cerimônia</a>
        <a class="btn" href="https://maps.app.goo.gl/HCoaKwvwQARE5mwz9" target="_blank">Recepção</a>
        <a class="btn" href="https://www.bemol.com.br/lp/marcia%26ronilson" target="_blank">Lista de Presentes</a>

        <div class="consulta-box">
          <p><strong>Confirmação de presença</strong></p>
          <input id="busca" class="input" placeholder="Digite seu nome ou telefone">

          <button onclick="consultar()">Consultar e confirmar</button>

          <div id="resultado" class="resultado"></div>
        </div>

      </div>

    </div>
  </div>
</div>

<script>
function abrirConvite(){
  document.getElementById("envelope").classList.add("abrir");

  setTimeout(()=>{
    document.getElementById("tela-abertura").style.display="none";
    document.getElementById("site").style.display="block";
    window.scrollTo(0,0);
  },1100);
}

/* NORMALIZAR */
function normalizar(txt){
  return txt.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/\s/g,"")
    .replace(/[^\w]/g,"");
}

/* LISTA COMPLETA */
const convidados = [
{nome:"Elena",tel:"92988415301"},
{nome:"Raimundo",tel:"92999825332"},
{nome:"Ronald",tel:"92984501066"},
{nome:"Ângela",tel:"92984088432"},
{nome:"William",tel:"92981270904"},
{nome:"Ana Rita",tel:"92993471741"},
{nome:"Edvaldo",tel:"92993293049"},
{nome:"Maria",tel:"92984752375"},
{nome:"Júnior",tel:"92999767612"},
{nome:"Margareth e Brenda",tel:"92991284550"},
{nome:"Anilson",tel:"92993704465"},
{nome:"Vânia, Vitor e Rosana",tel:"92991772318"},
{nome:"Mariângela e Jessica",tel:""},
{nome:"Renilson e Ane",tel:""},
{nome:"Mônica e Sandro",tel:"92994730568"},
{nome:"Dorlean e Cleide",tel:"92991248952"},
{nome:"Luany e Fábio",tel:"92992412919"},
{nome:"Raiany e esposo",tel:"92991149954"},
{nome:"Ilana e esposo",tel:"92993056808"},
{nome:"Silmara",tel:"92986293661"},
{nome:"Ivana e filha",tel:"92991361649"},
{nome:"Erick e Débora",tel:"92982533114"},
{nome:"Maria Manfredo e esposo",tel:"92991953961"},
{nome:"Fabian e esposa",tel:"92981212395"},
{nome:"José Francisco e esposa",tel:"92988362416"},
{nome:"Edevaldo e esposa",tel:"92988115257"},
{nome:"Juan e esposa",tel:"92982385626"},
{nome:"Roberto",tel:""},
{nome:"Clodoaldo e esposa",tel:"92981710375"}
];

function consultar(){
  const input = document.getElementById("busca").value;

  if(!input.trim()){
    document.getElementById("resultado").innerText = "Digite seu nome ou telefone.";
    return;
  }

  const busca = normalizar(input);

  const encontrados = convidados.filter(c =>
    normalizar(c.nome).includes(busca) ||
    c.tel.includes(busca)
  );

  if(encontrados.length > 0){
    const pessoa = encontrados[0];

    const msg = `Confirmo presença no casamento de Ronilson & Márcia.\nNome: ${pessoa.nome}`;

    document.getElementById("resultado").innerText =
      `Convidado encontrado.\nNome: ${pessoa.nome}\nPresença confirmada.`;

    window.open(`https://wa.me/5592984236693?text=${encodeURIComponent(msg)}`, "_blank");
  }else{
    document.getElementById("resultado").innerText =
      "Nome não encontrado. Verifique se digitou corretamente.";
  }
}
</script>

</body>
</html>

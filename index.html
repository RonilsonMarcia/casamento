<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronilson & Márcia</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a24a;
  --gold-light:#f4d27a;
  --gold-dark:#8a6424;
  --dark:#3f4d63;
  --blue:#4f5f78;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#d6dde6,#f7f1e8,#ffffff);
  color:var(--dark);
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* CARD */
.card{
  max-width:1000px;
  width:100%;
  background:#fff;
  padding:30px;
  border-radius:30px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  text-align:center;
}

/* IMAGENS */
.logo1{
  width:100%;
  max-width:350px;
  height:220px;
  object-fit:cover;
  border-radius:20px;
  margin-bottom:20px;
}

.logo2{
  width:250px;
}

/* NOMES */
.nomes{
  font-family:'Alex Brush';
  font-size:60px;
  margin:10px 0;
  background:linear-gradient(45deg,#8a6424,#c9a24a,#f4d27a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* DATA */
.data-casamento{margin:25px 0}

.dia{
  font-family:'Cinzel';
  font-size:80px;
  font-weight:bold;
  background:linear-gradient(45deg,#8a6424,#c9a24a,#f4d27a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.mes-ano{
  font-family:'Cinzel';
  font-size:18px;
  letter-spacing:2px;
  color:var(--gold-dark);
}

.hora{margin-top:5px}

/* BOTÕES */
.btn{
  display:block;
  margin:10px auto;
  padding:12px;
  background:linear-gradient(135deg,#4f5f78,#3f4d63);
  color:#f4d27a;
  border-radius:25px;
  text-decoration:none;
  width:90%;
  max-width:300px;
  cursor:pointer;
  border:none;
}

/* INPUT */
.input{
  width:90%;
  max-width:300px;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.resultado{
  margin-top:10px;
  font-size:14px;
  white-space:pre-line;
}

/* RESPONSIVO */
@media(min-width:768px){
  .card{
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    text-align:left;
  }

  .left{text-align:center}
}
</style>
</head>

<body>

<div class="hero">
  <div class="card">

    <div class="left">
      <img src="fotoigreja.jpeg" class="logo1">
      <img src="rm1.png" class="logo2">
    </div>

    <div class="right">
      <h1 class="nomes">Ronilson & Márcia</h1>

      <p>Com alegria no coração, convidamos você para celebrar conosco este momento especial.</p>

      <div class="data-casamento">
        <div class="dia">30</div>
        <div class="mes-ano">OUTUBRO • 2026</div>
        <div class="hora">às 19h</div>
      </div>

      <!-- CONSULTA -->
      <input id="busca" class="input" placeholder="Digite seu nome ou telefone">

      <button class="btn" onclick="consultar()">Confirmar Presença</button>

      <div id="resultado" class="resultado"></div>

    </div>

  </div>
</div>

<script>

/* NORMALIZAR */
function normalizar(txt){
  return txt.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/\s/g,"");
}

/* LISTA COMPLETA */
const convidados = [
{nome:"Elena",tel:"92988415301"},
{nome:"Raimundo",tel:"92999825332"},
{nome:"Ronald",tel:"92984501066"},
{nome:"Ângela",tel:"92984088432"},
{nome:"William",tel:"92981270904"},
{nome:"Ana Rita",tel:"92993471741"},
{nome:"Edvaldo",tel:"92993293049"},
{nome:"Maria",tel:"92984752375"},
{nome:"Júnior",tel:"92999767612"},
{nome:"Margareth e Brenda",tel:"92991284550"},
{nome:"Anilson",tel:"92993704465"},
{nome:"Vânia, Vitor e Rosana",tel:"92991772318"},
{nome:"Mariângela e Jessica",tel:""},
{nome:"Renilson e Ane",tel:""},
{nome:"Mônica e Sandro",tel:"92994730568"},
{nome:"Dorlean e Cleide",tel:"92991248952"},
{nome:"Luany e Fábio",tel:"92992412919"},
{nome:"Raiany e esposo",tel:"92991149954"},
{nome:"Ilana e esposo",tel:"92993056808"},
{nome:"Silmara",tel:"92986293661"},
{nome:"Ivana e filha",tel:"92991361649"},
{nome:"Erick e Débora",tel:"92982533114"},
{nome:"Maria Manfredo e esposo",tel:"92991953961"},
{nome:"Fabian e esposa",tel:"92981212395"},
{nome:"José Francisco e esposa",tel:"92988362416"},
{nome:"Edevaldo e esposa",tel:"92988115257"},
{nome:"Juan e esposa",tel:"92982385626"},
{nome:"Roberto",tel:""},
{nome:"Clodoaldo e esposa",tel:"92981710375"}
];

/* CONSULTA */
function consultar(){
  const input = document.getElementById("busca").value;

  if(!input){
    document.getElementById("resultado").innerText = "Digite seu nome ou telefone.";
    return;
  }

  const busca = normalizar(input);

  const encontrados = convidados.filter(c =>
    normalizar(c.nome).includes(busca) || c.tel.includes(busca)
  );

  if(encontrados.length > 0){

    let pessoa = encontrados[0];

    let msg = `Confirmo presença no casamento\nNome: ${pessoa.nome}`;

    document.getElementById("resultado").innerText =
      `Confirmado ✅\nNome: ${pessoa.nome}`;

    /* ENVIA WHATSAPP */
    window.open(`https://wa.me/5592984236693?text=${encodeURIComponent(msg)}`);

  }else{
    document.getElementById("resultado").innerText = "Nome não encontrado ❌";
  }
}

</script>

</body>
</html>

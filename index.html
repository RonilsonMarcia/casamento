<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Convite Especial</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0f1a2b;
  font-family:'Playfair Display', serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#333;
}

/* CARD PRINCIPAL */
.convite{
  width:320px;
  height:580px;
  background:#fff;
  border-radius:25px;
  overflow:hidden;
  position:relative;
  box-shadow:0 20px 50px rgba(0,0,0,.4);
}

/* TOPO */
.topo{
  text-align:center;
  padding:20px;
}

.monograma{
  font-size:40px;
  color:#0f1a2b;
  font-weight:bold;
}

.titulo{
  font-size:14px;
  letter-spacing:2px;
  margin-top:10px;
}

/* ENVELOPE */
.envelope{
  position:relative;
  width:100%;
  height:220px;
  background:#0f1a2b;
  cursor:pointer;
  overflow:hidden;
}

/* TAMPA */
.tampa{
  position:absolute;
  width:100%;
  height:100%;
  background:#142845;
  clip-path:polygon(0 0, 100% 0, 50% 100%);
  transform-origin:top;
  transition:1s;
  z-index:2;
}

/* ABRIR */
.envelope.aberto .tampa{
  transform:rotateX(180deg);
}

/* TEXTO */
.texto{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#fff;
  font-size:13px;
}

/* CONTEÚDO */
.conteudo{
  padding:20px;
  text-align:center;
  opacity:0;
  transition:1s;
}

.envelope.aberto ~ .conteudo{
  opacity:1;
}

/* NOMES */
.nomes{
  font-family:'Great Vibes', cursive;
  font-size:36px;
  color:#000;
  margin-top:10px;
}

/* DATA */
.data{
  margin-top:10px;
  font-size:14px;
  letter-spacing:1px;
}

/* BOTÃO */
button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#0f1a2b;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="convite">

  <div class="topo">

    <div class="monograma">
      <img src="rm1.png" alt="Monograma" class="img-monograma">
    </div>

    <div class="titulo">
      CONVITE ESPECIAL DE CASAMENTO
    </div>

  </div>

  <div class="envelope" onclick="abrirEnvelope()" id="env">
    <div class="tampa"></div>
    <div class="texto">CLIQUE NO ENVELOPE</div>
  </div>

  <div class="conteudo">
    <div class="nomes">Ronilson & Márcia</div>
    <div class="data">30 Outubro 2026 • 19h</div>

    <button onclick="confirmar()">Confirmar Presença</button>
  </div>

</div>

<script>

function abrirEnvelope(){
  document.getElementById("env").classList.toggle("aberto");
}

function confirmar(){
  const msg = encodeURIComponent(
`Confirmo minha presença no casamento 💛`
  );

  window.open("https://wa.me/5592984236693?text="+msg);
}

</script>

</body>
</html>

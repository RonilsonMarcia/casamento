<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronilson & Márcia</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a24a;
  --gold-light:#f4d27a;
  --gold-dark:#8a6424;
  --dark:#3f4d63;
  --blue:#4f5f78;
  --cream:#fffaf2;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#d6dde6,#f7f1e8,#ffffff);
  color:var(--dark);
}

/* CARD */
.card{
  max-width:900px;
  margin:30px auto;
  background:#fff8ec;
  padding:30px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,.2);
}

/* NOMES */
.nomes{
  font-family:'Alex Brush',cursive;
  font-size:60px;
  color:var(--gold-dark);
}

/* DATA */
.data-destaque{
  margin:20px 0;
  font-family:'Cinzel',serif;
}
.data-destaque .dia{
  font-size:90px;
  font-weight:bold;
}
.data-destaque .mes{
  display:block;
  font-size:26px;
  letter-spacing:3px;
}
.data-destaque .ano,
.data-destaque .hora{
  font-size:18px;
  color:#555;
}

/* BOTÕES */
.btn{
  display:block;
  margin:10px auto;
  padding:12px;
  border-radius:25px;
  background:#4f5f78;
  color:#fff;
  text-decoration:none;
  max-width:250px;
}

/* SEÇÕES */
section{
  padding:40px 15px;
  text-align:center;
}

.titulo{
  font-family:'Alex Brush',cursive;
  font-size:42px;
  color:var(--gold);
}

/* BOX PADRÃO */
.box{
  max-width:600px;
  margin:auto;
  background:#fff8ec;
  padding:20px;
  border-radius:20px;
}

/* RECEPÇÃO ESTILO DA IMAGEM */
.recepcao-box{
  background:linear-gradient(180deg,#fffaf2,#f3e8d7);
  border-radius:25px;
  padding:25px;
  position:relative;
}

/* efeito pontilhado */
.recepcao-box::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:radial-gradient(rgba(201,162,74,.25) 1px, transparent 1px);
  background-size:20px 20px;
  border-radius:25px;
  opacity:.5;
}

.recepcao-box *{
  position:relative;
  z-index:1;
}

.local-nome{
  font-size:18px;
  margin-bottom:10px;
}

.endereco-label{
  font-size:13px;
  color:#777;
}

.endereco-texto{
  font-size:14px;
  margin-bottom:15px;
}

/* BOTÃO DOURADO */
.btn-local{
  background:linear-gradient(135deg,#c9a24a,#8a6424);
  color:#fff;
  border-radius:20px;
  padding:10px 20px;
  display:inline-block;
  text-decoration:none;
  font-size:14px;
  box-shadow:0 5px 15px rgba(0,0,0,.2);
}

</style>
</head>

<body>

<div class="card">

  <h1 class="nomes">Ronilson & Márcia</h1>

  <div class="data-destaque">
    <span class="dia">30</span>
    <span class="mes">Outubro</span>
    <span class="ano">2026</span>
    <span class="hora">19h</span>
  </div>

  <a class="btn" href="#recepcao">Ver Recepção</a>

</div>

<!-- RECEPÇÃO -->
<section id="recepcao">
  <h2 class="titulo">Recepção</h2>

  <div class="box recepcao-box">

    <p class="local-nome"><strong>Innovare Festas e Eventos</strong></p>

    <p class="endereco-label">Endereço:</p>
    <p class="endereco-texto">
      Av. Silves, 879 - Crespo, Manaus - AM, 69073-175
    </p>

    <a class="btn-local" target="_blank" href="https://maps.app.goo.gl/iXigGFA4DZK2rKfg9">
      Abrir localização
    </a>

  </div>
</section>

</body>
</html>

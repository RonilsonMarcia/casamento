<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronilson & Márcia</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a24a;
  --gold-light:#f4d27a;
  --dark:#3f4d63;
  --blue:#4f5f78;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#d6dde6,#f7f1e8,#ffffff);
}

/* ENVELOPE */
#tela-envelope{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.convite{
  width:100%;
  max-width:380px;
  background:#fff;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.3);
}

.topo{
  text-align:center;
  padding:25px;
}

.img-monograma{
  width:90px;
}

.titulo{
  font-size:12px;
  letter-spacing:2px;
  margin-top:10px;
}

.envelope{
  height:200px;
  background:linear-gradient(135deg,#4f5f78,#3f4d63);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  cursor:pointer;
}

/* SITE */
#site{
  display:none;
}

.pagina{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}

/* FOTO ESTILO CONVITE */
.foto-convite{
  position:relative;
  width:100%;
  max-width:430px;
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 25px 70px rgba(0,0,0,.25);
}

.foto-convite img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FADE */
.overlay{
  position:absolute;
  bottom:0;
  width:100%;
  height:55%;
  background:linear-gradient(to bottom, transparent, rgba(255,255,255,0.8), #fff);
}

/* TEXTO SOBRE FOTO */
.texto-foto{
  position:absolute;
  bottom:30px;
  left:15px;
  right:15px;
  text-align:center;
}

.frase{
  font-size:14px;
  color:#444;
  margin-bottom:10px;
}

/* NOMES */
.assinatura{
  font-family:'Alex Brush',cursive;
  font-size:60px;
  background:linear-gradient(45deg,#8a6424,#c9a24a,#f4d27a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  white-space:nowrap;
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="tela-envelope">
  <div class="convite">

    <div class="topo">
      <img src="rm1.png" class="img-monograma">
      <div class="titulo">CONVITE DE CASAMENTO</div>
    </div>

    <div class="envelope" onclick="abrir()">
      Clique para abrir
    </div>

  </div>
</div>

<!-- SITE -->
<div id="site">

  <!-- SEGUNDA PÁGINA -->
  <section class="pagina">
    <div class="foto-convite">

      <img src="fotoigreja.jpeg">

      <div class="overlay"></div>

      <div class="texto-foto">
        <div class="frase">
          As muitas águas não podem apagar o amor.
        </div>

        <div class="assinatura">
          Ronilson & Márcia
        </div>
      </div>

    </div>
  </section>

</div>

<script>
function abrir(){
  document.getElementById("tela-envelope").style.display="none";
  document.getElementById("site").style.display="block";
}
</script>

</body>
</html>

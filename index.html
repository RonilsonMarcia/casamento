<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronilson & Márcia</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a24a;
  --gold-light:#f4d27a;
  --gold-dark:#8a6424;
  --dark:#3f4d63;
  --blue:#4f5f78;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(135deg,#d6dde6,#f7f1e8,#ffffff);
  color:var(--dark);
}

/* CARD */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{
  max-width:1000px;
  width:100%;
  background:#fff;
  padding:30px;
  border-radius:30px;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  text-align:center;
}

/* IMAGEM AJUSTADA */
.logo1{
  width:100%;
  max-width:350px;
  height:220px;
  object-fit:cover;
  object-position:center;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  margin-bottom:20px;
}

.logo2{
  width:250px;
  margin-top:10px;
}

/* NOMES */
.nomes{
  font-family:'Alex Brush',cursive;
  font-size:60px;
  margin:10px 0;
  background:linear-gradient(45deg,#8a6424,#c9a24a,#f4d27a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* DATA ESTILO CASAMENTO */
.data-casamento{
  margin:25px 0;
}

.dia{
  font-family:'Cinzel',serif;
  font-size:80px;
  font-weight:bold;
  background:linear-gradient(45deg,#8a6424,#c9a24a,#f4d27a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.mes-ano{
  font-family:'Cinzel',serif;
  font-size:18px;
  letter-spacing:2px;
  color:var(--gold-dark);
}

.hora{
  margin-top:5px;
  font-style:italic;
}

/* BOTÕES */
.btn{
  display:block;
  margin:10px auto;
  padding:12px 20px;
  background:linear-gradient(135deg,#4f5f78,#3f4d63);
  color:#f4d27a;
  border-radius:25px;
  text-decoration:none;
  width:80%;
  max-width:300px;
}

/* RESPONSIVO */
@media(min-width:768px){
  .card{
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    text-align:left;
  }

  .left{text-align:center}
}
</style>
</head>

<body>

<div class="hero">
  <div class="card">

    <div class="left">
      <img src="fotoigreja.jpeg" class="logo1">
      <img src="rm1.png" class="logo2">
    </div>

    <div class="right">
      <h1 class="nomes">Ronilson & Márcia</h1>

      <p>
        Com alegria no coração, convidamos você para celebrar conosco este momento especial.
      </p>

      <!-- NOVA DATA -->
      <div class="data-casamento">
        <div class="dia">30</div>
        <div class="mes-ano">OUTUBRO • 2026</div>
        <div class="hora">às 19h</div>
      </div>

      <a class="btn" href="#">Cerimônia</a>
      <a class="btn" href="#">Recepção</a>
      <a class="btn" href="#">Lista de Presentes</a>

    </div>

  </div>
</div>

</body>
</html>

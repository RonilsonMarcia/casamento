<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ronilson & Márcia</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;overflow-x:hidden}

/* ===== ENVELOPE ===== */
#tela-envelope{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#111;
}

.convite{
  width:340px;
  background:#fff;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.topo{text-align:center;padding:20px}
.topo img{width:90px}

.envelope{
  height:200px;
  background:#2c3b52;
  position:relative;
  cursor:pointer;
}

.tampa{
  position:absolute;
  width:100%;
  height:100%;
  background:#1f2a3a;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transition:1s;
}

.envelope.aberto .tampa{
  transform:rotateX(180deg);
}

.texto{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#fff;
}

/* ===== HERO CINEMA ===== */
#site{display:none}

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;

  background:
    radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.8)),
    url('fotaigreja.jpeg') center/cover no-repeat;

  animation:zoomBg 12s ease-in-out infinite alternate;
}

@keyframes zoomBg{
  from{background-size:100%}
  to{background-size:110%}
}

/* OVERLAY VINHETA */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7));
}

/* CARD */
.card{
  position:relative;
  z-index:2;

  width:90%;
  max-width:800px;
  padding:60px 40px;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);

  border-radius:30px;
  border:1px solid rgba(255,255,255,0.2);

  text-align:center;
  color:#fff;
}

/* ANIMAÇÕES */
.fadeUp{
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1.5s forwards;
}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0)}
}

/* NOMES */
.nomes{
  font-family:'Alex Brush';
  font-size:70px;
  color:#f4d27a;
  animation-delay:.5s;
}

/* DATA */
.data{
  margin:20px 0;
  font-family:'Cinzel';
}

.dia{font-size:90px;display:block}
.mes{letter-spacing:3px}
.hora{margin-top:5px}

/* BOTÕES */
.btn{
  display:block;
  width:100%;
  margin:8px 0;
  padding:14px;

  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.4);
  color:#f4d27a;

  border-radius:30px;
  text-decoration:none;

  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1s forwards;
}

.btn:nth-child(1){animation-delay:1.5s}
.btn:nth-child(2){animation-delay:1.7s}
.btn:nth-child(3){animation-delay:1.9s}
.btn:nth-child(4){animation-delay:2.1s}

/* AUDIO */
.audio{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#000;
  color:#fff;
  padding:10px;
  border-radius:20px;
  z-index:999;
  cursor:pointer;
}

</style>
</head>

<body>

<audio id="musica" loop>
  <source src="amor.mp3" type="audio/mpeg">
</audio>

<div class="audio" onclick="playMusic()">Som</div>

<!-- ENVELOPE -->
<div id="tela-envelope">
  <div class="convite">
    <div class="topo">
      <img src="rm1.png">
    </div>

    <div class="envelope" onclick="abrir()" id="env">
      <div class="tampa"></div>
      <div class="texto">Abrir convite</div>
    </div>

    <div style="text-align:center;padding:15px;font-family:'Alex Brush';font-size:28px;color:#c9a24a;">
      Ronilson & Márcia
    </div>
  </div>
</div>

<!-- SITE -->
<div id="site">

<div class="hero">
<div class="card">

<h1 class="nomes fadeUp">Ronilson & Márcia</h1>

<div class="data fadeUp" style="animation-delay:1s">
  <span class="dia">30</span>
  <div class="mes">OUTUBRO 2026</div>
  <div class="hora">19 HORAS</div>
</div>

<a class="btn" href="#">Cerimônia</a>
<a class="btn" href="#">Recepção</a>
<a class="btn" href="#">Presentes</a>
<a class="btn" href="#">Consultar Senhas</a>

</div>
</div>

</div>

<script>

function abrir(){
  document.getElementById("env").classList.add("aberto");

  setTimeout(()=>{
    document.getElementById("tela-envelope").style.display="none";
    document.getElementById("site").style.display="block";

    // autoplay música após interação
    document.getElementById("musica").play();

  },1000);
}

function playMusic(){
  const m=document.getElementById("musica");
  if(m.paused){m.play()}else{m.pause()}
}

</script>

</body>
</html>
